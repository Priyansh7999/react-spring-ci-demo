name: CI Pipeline

on: 
    push:
        branches : [ main ]
    pull_request:
        branches: [ main ]

jobs:
    backend: 
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup java
              uses: actions/setup-java@v3
              with:
                distribution: 'temurin'
                java-version: '21'
            - name: Build and Test backend
              run: |
                cd backend
                ./gradlew test
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup Node
              uses: actions/setup-node@v3
              with: 
                node-version: '20'
            
            - name: Install dependencies
              run: |
                cd frontend
                npm install
            - name: Run frontend tests
              run: |
                cd frontend
                npm test

            - name: Build frontend
              run: |
                cd frontend
                npm run build

